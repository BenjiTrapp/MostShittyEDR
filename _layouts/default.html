<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <img src="{{ '/static/logo.png' | relative_url }}" alt="MostShittyEDR" class="header-logo"> MostShittyEDR
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/challenges/' | relative_url }}">Challenges</a>
        <a href="{{ '/solutions/' | relative_url }}">Solutions</a>
        <a href="{{ '/edr-explained/' | relative_url }}">EDR Explained</a>
        <a href="https://github.com/BenjiTrapp/MostShittyEDR">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>MostShittyEDR — Educational Security Research Tool</p>
      <p>This is NOT production security software. For learning purposes only.</p>
    </div>
  </footer>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });
  </script>
</body>
</html>
